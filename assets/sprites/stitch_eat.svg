<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 24" shape-rendering="crispEdges">
  <rect width="32" height="24" fill="none"/>
  <!-- Left ear -->
  <rect x="4" y="4" width="4" height="6" fill="#3366ff"/>
  <!-- Right ear -->
  <rect x="24" y="4" width="4" height="6" fill="#3366ff"/>
  <!-- Head/Body -->
  <rect x="6" y="6" width="20" height="12" fill="#3366ff"/>
  <!-- Top spikes/hair -->
  <rect x="10" y="2" width="2" height="4" fill="#3366ff"/>
  <rect x="14" y="1" width="2" height="5" fill="#3366ff"/>
  <rect x="18" y="2" width="2" height="4" fill="#3366ff"/>
  <!-- Left eye white (narrowed/happy) -->
  <rect x="10" y="10" width="4" height="3" fill="#ffffff"/>
  <!-- Right eye white (narrowed/happy) -->
  <rect x="18" y="10" width="4" height="3" fill="#ffffff"/>
  <!-- Left pupil -->
  <rect x="11" y="10" width="2" height="2" fill="#000000"/>
  <!-- Right pupil -->
  <rect x="19" y="10" width="2" height="2" fill="#000000"/>
  <!-- Open mouth (wide) -->
  <rect x="8" y="15" width="16" height="3" fill="#1a1a1a"/>
  <!-- Inner mouth red -->
  <rect x="9" y="16" width="14" height="2" fill="#cc0000"/>
  <!-- Upper teeth (more prominent) -->
  <rect x="10" y="15" width="1" height="1" fill="#ffffff"/>
  <rect x="12" y="15" width="1" height="1" fill="#ffffff"/>
  <rect x="14" y="15" width="1" height="1" fill="#ffffff"/>
  <rect x="16" y="15" width="1" height="1" fill="#ffffff"/>
  <rect x="18" y="15" width="1" height="1" fill="#ffffff"/>
  <rect x="20" y="15" width="1" height="1" fill="#ffffff"/>
  <!-- Lower teeth -->
  <rect x="10" y="17" width="1" height="1" fill="#ffffff"/>
  <rect x="12" y="17" width="1" height="1" fill="#ffffff"/>
  <rect x="14" y="17" width="1" height="1" fill="#ffffff"/>
  <rect x="16" y="17" width="1" height="1" fill="#ffffff"/>
  <rect x="18" y="17" width="1" height="1" fill="#ffffff"/>
  <rect x="20" y="17" width="1" height="1" fill="#ffffff"/>
  <!-- Left foot -->
  <rect x="8" y="19" width="3" height="3" fill="#1a1a1a"/>
  <!-- Right foot -->
  <rect x="21" y="19" width="3" height="3" fill="#1a1a1a"/>
</svg>
